<!doctype html>
<html lang="en">
  <head>
  <style>
  .loader-circle {
    width: 50px; height: 50px;
    border: 5px solid #3a6baf;
    border-top: 5px solid #732bb6;
    border-radius: 50%;
    animation: spin 1s linear infinite;
  }
  @keyframes spin {
    0% { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
  }
</style>
  </head>

  <body>
    <div id="loading-layer" style="position: fixed; top: 0; left: 0; width: 100%; height: 100vh; background-color: #0f172a; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 9999; color: white; font-family: sans-serif; transition: opacity 0.5s ease;">
      <div class="loader-circle"></div>
      <p>⏳Clara's portfolio is loading...</p>
    </div>

    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>

    <script>
      window.addEventListener("load", function() {
        const loader = document.getElementById("loading-layer");
        setTimeout(() => {
          if(loader) {
            loader.style.opacity = "0";
            setTimeout(() => {
              loader.style.display = "none";
            }, 500);
          }
        }, 50000); 
      });
    </script>
  </body>
  </html>
